version: 2
updates:
  # Backend dependencies
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    reviewers:
      - "TheSander562"
    assignees:
      - "TheSander562"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    groups:
      # All patch updates together, may be merged when CI is green.
      patch-updates:
        update-types: ["patch"]
      # All minor updates together. Requires green CI + manual check.
      minor-updates:
        update-types: ["minor"]

  # Frontend dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    reviewers:
      - "TheSander562"
    assignees:
      - "TheSander562"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    groups:
      # All patch updates together, may be merged when CI is green.
      patch-updates:
        update-types: ["patch"]
      # All minor updates together. Requires green CI + manual check.
      minor-updates:
        update-types: ["minor"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    reviewers:
      - "TheSander562"
    assignees:
      - "TheSander562"
    commit-message:
      prefix: "ci"
      include: "scope"
