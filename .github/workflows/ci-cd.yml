name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
    paths:
      - '.github/**'
      - 'backend/**'
      - 'frontend/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend

jobs:
  # Test job - runs on PR and push
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run backend tests
        run: |
          cd backend
          npm run test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test

      - name: Run backend linting
        run: |
          cd backend
          npm run lint

      - name: Run frontend linting
        run: |
          cd frontend
          npm run lint

  check-changes:
    runs-on: ubuntu-latest
    # define the output variables, and set them to 
    # the output from `filter` step
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # 4.0.1
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # Build and push Docker images
  build-and-push:
    runs-on: ubuntu-latest
    # depend on the `check-changes` job to succeed
    needs:
      - test
      - check-changes
    if: |
      (github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/dev' ||
        startsWith(github.ref, 'refs/tags/')
      )) ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # 4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # 4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # 4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        if: ${{ needs.check-changes.outputs.backend == 'true' }}
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # 6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            # Branch name (main, feature-x)
            type=ref,event=branch
            # PR (pr-123)
            type=ref,event=pr
            # Git tags (v1.2.3)
            type=ref,event=tag
            # SHA only on default branch (avoid spam)
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            # Latest
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for frontend
        id: meta-frontend
        if: ${{ needs.check-changes.outputs.frontend == 'true' }}
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # 6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            # Branch name (main, feature-x)
            type=ref,event=branch
            # PR (pr-123)
            type=ref,event=pr
            # Git tags (v1.2.3)
            type=ref,event=tag
            # SHA only on default branch (avoid spam)
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            # Latest
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        if: ${{ needs.check-changes.outputs.backend == 'true' }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # 7.1.0
        with:
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push frontend image
        if: ${{ needs.check-changes.outputs.frontend == 'true' }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # 7.1.0
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
