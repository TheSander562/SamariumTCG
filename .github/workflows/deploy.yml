name: Deploy to Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      tag:
        description: 'Image tag to deploy (leave empty for latest)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set deployment variables
        id: vars
        run: |
          ENVIRONMENT="${{ inputs.environment || 'staging' }}"
          TAG="${{ inputs.tag || 'latest' }}"

          if [ "$ENVIRONMENT" = "staging" ]; then
            BRANCH="develop"
            TAG="${TAG:-develop}"
          else
            BRANCH="main"
            TAG="${TAG:-latest}"
          fi

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "backend_image=${{ env.REGISTRY }}/${{ github.repository }}/backend:$TAG" >> $GITHUB_OUTPUT
          echo "frontend_image=${{ env.REGISTRY }}/${{ github.repository }}/frontend:$TAG" >> $GITHUB_OUTPUT

      - name: Deploy to ${{ steps.vars.outputs.environment }}
        run: |
          echo "🚀 Deploying to ${{ steps.vars.outputs.environment }} environment"
          echo "Branch: ${{ steps.vars.outputs.branch }}"
          echo "Tag: ${{ steps.vars.outputs.tag }}"
          echo "Backend: ${{ steps.vars.outputs.backend_image }}"
          echo "Frontend: ${{ steps.vars.outputs.frontend_image }}"

          # Create deployment directory on server
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << EOF
            set -e

            echo "📁 Setting up deployment directory..."
            mkdir -p ~/samariumtcg-${{ steps.vars.outputs.environment }}
            cd ~/samariumtcg-${{ steps.vars.outputs.environment }}

            # Backup current docker-compose.yml if it exists
            if [ -f docker-compose.yml ]; then
              cp docker-compose.yml docker-compose.yml.backup.$(date +%Y%m%d_%H%M%S)
            fi

            echo "📥 Pulling latest code..."
            git fetch origin
            git checkout ${{ steps.vars.outputs.branch }}
            git pull origin ${{ steps.vars.outputs.branch }}

            echo "🔧 Updating environment configuration..."
            # Copy .env template and update with production values
            cp .env.example .env
            # Environment-specific secrets would be set here

            echo "🐳 Updating Docker images..."
            docker pull ${{ steps.vars.outputs.backend_image }}
            docker pull ${{ steps.vars.outputs.frontend_image }}

            echo "🗄️ Running database migrations..."
            # Run migrations if needed (this would be environment-specific)

            echo "🚀 Starting services..."
            docker-compose down
            docker-compose up -d

            echo "⏳ Waiting for services to be healthy..."
            sleep 30

            echo "🔍 Running health checks..."
            # Health check logic here

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment completed successfully!"
          EOF

      - name: Run post-deployment tests
        run: |
          echo "🧪 Running post-deployment tests..."

          # Wait for services to be fully ready
          sleep 60

          # Test backend health
          if curl -f -s http://localhost:3001/api/health > /dev/null; then
            echo "✅ Backend health check passed"
          else
            echo "❌ Backend health check failed"
            exit 1
          fi

          # Test frontend accessibility
          if curl -f -s http://localhost:3000 > /dev/null; then
            echo "✅ Frontend accessibility check passed"
          else
            echo "❌ Frontend accessibility check failed"
            exit 1
          fi

      - name: Notify deployment success
        if: success()
        run: |
          echo "🎉 Deployment to ${{ steps.vars.outputs.environment }} completed successfully!"
          echo "🌐 Application URL: https://${{ steps.vars.outputs.environment }}.samariumtcg.com"

          # Here you could add Slack/Discord notifications
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"🚀 SamariumTCG deployed to ${{ steps.vars.outputs.environment }}"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment to ${{ steps.vars.outputs.environment }} failed!"

          # Here you could add failure notifications
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"❌ SamariumTCG deployment to ${{ steps.vars.outputs.environment }} failed"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
