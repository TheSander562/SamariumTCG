name: Pull Request Tests

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]

jobs:
  # Quick validation checks
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'

      - name: Validate backend package.json
        run: |
          cd backend
          npm install --dry-run

      - name: Validate frontend package.json
        run: |
          cd frontend
          npm install --dry-run

      - name: Check for sensitive files
        run: |
          # Check that no .env files are committed
          if find . -name ".env" -not -path "./.env.example" | grep -q .; then
            echo "❌ Found .env files that should not be committed"
            exit 1
          fi

          # Check that no secrets are in the code
          if grep -r "password\|secret\|token\|key" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" . | grep -v "node_modules\|.git\|password.*placeholder\|secret.*placeholder\|token.*placeholder\|key.*placeholder" | grep -q .; then
            echo "⚠️  Found potential secrets in code. Please review."
            exit 1
          fi

  # Full test suite
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run backend type checking
        run: |
          cd backend
          npm run build

      - name: Run frontend type checking
        run: |
          cd frontend
          npm run build

      - name: Run backend tests
        run: |
          cd backend
          npm run test:cov
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test:cov

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage/lcov.info,./frontend/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Docker build test
  docker-build-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Compose
        run: |
          # Test that docker-compose builds without errors
          docker-compose build --parallel
          echo "✅ Docker Compose build successful"
