name: Security & Maintenance

on:
  schedule:
    # Run weekly on Mondays at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  # Security scanning
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run npm audit
        run: |
          echo "🔍 Running npm audit on backend..."
          cd backend
          npm audit --audit-level moderate || true

          echo "🔍 Running npm audit on frontend..."
          cd frontend
          npm audit --audit-level moderate || true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Dependency updates
  dependency-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Check for outdated dependencies (backend)
        run: |
          cd backend
          echo "📦 Backend dependency status:"
          npm outdated || true

      - name: Check for outdated dependencies (frontend)
        run: |
          cd frontend
          echo "📦 Frontend dependency status:"
          npm outdated || true

      - name: Create dependency update PR (if needed)
        run: |
          # This would typically use a tool like Dependabot
          # or create automated PRs for dependency updates
          echo "🔄 Dependency update check completed"
          echo "Consider enabling Dependabot for automated updates"

  # Docker image vulnerability scan
  docker-security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image for scanning
        run: |
          cd backend
          docker build -t samarium-backend-scan .

      - name: Build frontend image for scanning
        run: |
          cd frontend
          docker build -t samarium-frontend-scan .

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scan-ref: 'samarium-backend-scan'
          format: 'sarif'
          output: 'backend-trivy-results.sarif'

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scan-ref: 'samarium-frontend-scan'
          format: 'sarif'
          output: 'frontend-trivy-results.sarif'

      - name: Upload backend scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'backend-trivy-results.sarif'

      - name: Upload frontend scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'frontend-trivy-results.sarif'

      - name: Clean up scan images
        if: always()
        run: |
          docker rmi samarium-backend-scan samarium-frontend-scan || true
