services:
  # Next.js Frontend
  samariumtcg-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: samariumtcg-frontend
    depends_on:
      samariumtcg-backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/public:/app/public
    ports:
      - "3000:3000"
    networks:
      - samariumtcg_internal
    restart: unless-stopped

  samariumtcg-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samariumtcg-backend
    depends_on:
      samariumtcg-postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: samariumtcg-postgres
      DB_PORT: 5432
      DB_USER: samariumtcg
      DB_PASSWORD: changeme
      DB_NAME: samarium_tcg
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      PORT: 3001
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - shared_images:/app/images
    ports:
      - "3001:3001"
    networks:
      - samariumtcg_internal
    restart: unless-stopped

  # PostgreSQL Database
  samariumtcg-postgres:
    image: postgres:18-alpine
    container_name: samariumtcg-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-samarium}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-samarium_tcg}
    volumes:
      - samariumtcg_postgres_data:/var/lib/postgresql
    networks:
      - samariumtcg_internal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-samarium}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  samariumtcg_postgres_data:

networks:
  samariumtcg_internal:
