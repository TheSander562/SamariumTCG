services:
  # Next.js Frontend
  samariumtcg-frontend:
    image: ghcr.io/thesander562/samariumtcg/frontend:pr-17
    container_name: samariumtcg-frontend
    depends_on:
      samariumtcg-backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    networks:
      - samariumtcg_internal
    restart: unless-stopped

  # NestJS Backend API
  samariumtcg-backend:
    image: ghcr.io/thesander562/samariumtcg/backend:pr-17
    container_name: samariumtcg-backend
    depends_on:
      samariumtcg-postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY}
      PORT: 3001
    ports:
      - "3001:3001"
    networks:
      - samariumtcg_internal
    restart: unless-stopped

  # PostgreSQL Database
  samariumtcg-postgres:
    image: postgres:18
    container_name: samariumtcg-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - samariumtcg_postgres_data:/var/lib/postgresql
    networks:
      - samariumtcg_internal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  samariumtcg_postgres_data:

networks:
  samariumtcg_internal:
