services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: samarium_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-samarium}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-samarium_tcg}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-samarium}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - samarium_network

  # NestJS Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samarium_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-samarium}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-samarium_tcg}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - shared_images:/app/images
    networks:
      - samarium_network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: samarium_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/public:/app/public
    networks:
      - samarium_network

volumes:
  postgres_data:
  shared_images:

networks:
  samarium_network:
    driver: bridge
